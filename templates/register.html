<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — FinanceAI</title>
    <link rel="stylesheet" href="/static/css/login.css">
    <style>
        .scene {
            max-width: 920px;
        }

        .brand-panel .brand-stats {
            margin-top: auto;
        }

        .form-panel {
            padding: 48px 44px;
        }
    </style>
</head>

<body>
    <div class="bg-layer">
        <div class="bg-grid"></div>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="scene">
        <!-- Left Branding -->
        <div class="brand-panel">
            <div class="brand-logo">
                <div class="logo-icon">💹</div>
                <span class="logo-name">Finance<span>AI</span></span>
            </div>
            <div class="brand-headline">
                <h1>Start your<br><em>financial</em><br>journey.</h1>
                <p>Join thousands managing wealth smarter. Free forever, AI-powered.</p>
            </div>
            <div class="brand-stats">
                <div class="stat-row">
                    <div class="stat-dot dot-gold"></div>
                    <span class="stat-label">Setup Time</span>
                    <span class="stat-value">2 minutes</span>
                </div>
                <div class="stat-row">
                    <div class="stat-dot dot-cyan"></div>
                    <span class="stat-label">AI Features</span>
                    <span class="stat-value">Unlimited</span>
                </div>
                <div class="stat-row">
                    <div class="stat-dot dot-green"></div>
                    <span class="stat-label">Bank-Grade Security</span>
                    <span class="stat-value">256-bit AES</span>
                </div>
            </div>
        </div>

        <!-- Right Form -->
        <div class="form-panel">
            <div class="form-header">
                <h2>Create Account</h2>
                <p>Your secure financial dashboard awaits</p>
            </div>
            <div class="form-body">
                <div class="field-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrap">
                        <input type="text" id="name" placeholder="Your full name" autocomplete="name" />
                        <span class="input-icon">👤</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
                        <span class="input-icon">✉</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="mobile">Mobile Number</label>
                    <div class="input-wrap">
                        <input type="tel" id="mobile" placeholder="+91 XXXXX XXXXX" autocomplete="tel" />
                        <span class="input-icon">📱</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Min 8 characters" autocomplete="new-password"
                            oninput="checkStrength(this.value)" />
                        <span class="input-icon">🔑</span>
                        <button class="show-toggle" type="button" id="eyeBtn" onclick="togglePassword()"
                            aria-label="Toggle">👁</button>
                    </div>
                    <!-- Strength meter -->
                    <div id="strengthBar" style="display:none;margin-top:8px;">
                        <div style="display:flex;gap:4px;margin-bottom:5px;">
                            <div id="sb1"
                                style="flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.08);transition:background .3s;">
                            </div>
                            <div id="sb2"
                                style="flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.08);transition:background .3s;">
                            </div>
                            <div id="sb3"
                                style="flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.08);transition:background .3s;">
                            </div>
                            <div id="sb4"
                                style="flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.08);transition:background .3s;">
                            </div>
                        </div>
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span id="strengthLabel" style="font-size:11px;font-weight:600;"></span>
                            <span id="strengthTip" style="font-size:10px;color:#475569;"></span>
                        </div>
                    </div>
                </div>

                <button class="btn-submit" onclick="handleRegister()" id="regBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-spinner"></span>
                </button>

                <p id="message"
                    style="text-align:center;margin-top:12px;font-size:13px;border-radius:9px;padding:9px 13px;"></p>

                <div class="divider"><span>or</span></div>
                <div class="register-row">
                    Already have an account? <a href="/login">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            const btn = document.getElementById("eyeBtn");
            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";
            btn.textContent = isHidden ? "🙈" : "👁";
            // keep placeholder intact — it's on the input element, type change doesn't affect it
        }

        function checkStrength(pw) {
            const bar = document.getElementById("strengthBar");
            if (!pw) { bar.style.display = "none"; return; }
            bar.style.display = "block";

            let score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            score = Math.min(score, 4);

            const colors = ["#f87171", "#fb923c", "#facc15", "#22c55e"];
            const labels = ["Weak", "Fair", "Good", "Strong"];
            const tips = ["Add uppercase & numbers", "Add special characters", "Almost there!", "Great password! ✓"];

            for (let i = 1; i <= 4; i++) {
                document.getElementById("sb" + i).style.background =
                    i <= score ? colors[score - 1] : "rgba(255,255,255,.08)";
            }
            document.getElementById("strengthLabel").textContent = labels[score - 1] || "";
            document.getElementById("strengthLabel").style.color = colors[score - 1] || "#475569";
            document.getElementById("strengthTip").textContent = tips[score - 1] || "";
        }

        async function handleRegister() {
            const btn = document.getElementById("regBtn");
            const msg = document.getElementById("message");
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const mobile = document.getElementById("mobile").value.trim();
            const password = document.getElementById("password").value;

            if (!name || !email || !password) {
                showMsg("Please fill all required fields.", false); return;
            }
            if (password.length < 8) {
                showMsg("Password must be at least 8 characters.", false); return;
            }

            btn.classList.add("loading");
            msg.style.display = "none";

            try {
                const res = await fetch("/api/v1/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, mobile_number: mobile, password })
                });

                let data;
                const text = await res.text();
                try { data = JSON.parse(text); } catch (e) { data = { detail: text }; }

                btn.classList.remove("loading");

                if (res.ok) {
                    showMsg("✅ Account created! Redirecting to login…", true);
                    setTimeout(() => window.location.href = "/login", 1400);
                } else {
                    showMsg(data.detail || "Registration failed.", false);
                }
            } catch (err) {
                btn.classList.remove("loading");
                showMsg("Network error. Please try again.", false);
            }
        }

        function showMsg(text, ok) {
            const el = document.getElementById("message");
            el.textContent = text;
            el.style.display = "block";
            el.style.background = ok ? "rgba(61,220,151,.08)" : "rgba(255,94,109,.08)";
            el.style.border = ok ? "1px solid rgba(61,220,151,.2)" : "1px solid rgba(255,94,109,.2)";
            el.style.color = ok ? "#3ddc97" : "#ff5e6d";
        }

        document.addEventListener("keydown", e => { if (e.key === "Enter") handleRegister(); });
    </script>
</body>

</html>
