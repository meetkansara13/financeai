<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — FinanceAI</title>
    <link rel="stylesheet" href="/static/css/login.css">
    <style>
        .scene {
            max-width: 920px;
        }

        .brand-panel .brand-stats {
            margin-top: auto;
        }

        .form-panel {
            padding: 48px 44px;
        }
    </style>
</head>

<body>
    <div class="bg-layer">
        <div class="bg-grid"></div>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="scene">
        <!-- Left Branding -->
        <div class="brand-panel">
            <div class="brand-logo">
                <div class="logo-icon">💹</div>
                <span class="logo-name">Finance<span>AI</span></span>
            </div>
            <div class="brand-headline">
                <h1>Start your<br><em>financial</em><br>journey.</h1>
                <p>Join thousands managing wealth smarter. Free forever, AI-powered.</p>
            </div>
            <div class="brand-stats">
                <div class="stat-row">
                    <div class="stat-dot dot-gold"></div>
                    <span class="stat-label">Setup Time</span>
                    <span class="stat-value">2 minutes</span>
                </div>
                <div class="stat-row">
                    <div class="stat-dot dot-cyan"></div>
                    <span class="stat-label">AI Features</span>
                    <span class="stat-value">Unlimited</span>
                </div>
                <div class="stat-row">
                    <div class="stat-dot dot-green"></div>
                    <span class="stat-label">Bank-Grade Security</span>
                    <span class="stat-value">256-bit AES</span>
                </div>
            </div>
        </div>

        <!-- Right Form -->
        <div class="form-panel">
            <div class="form-header">
                <h2>Create Account</h2>
                <p>Your secure financial dashboard awaits</p>
            </div>
            <div class="form-body">
                <div class="field-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrap">
                        <input type="text" id="name" placeholder="Your full name" autocomplete="name" />
                        <span class="input-icon">👤</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
                        <span class="input-icon">✉</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="mobile">Mobile Number</label>
                    <div class="input-wrap">
                        <input type="tel" id="mobile" placeholder="+91 XXXXX XXXXX" autocomplete="tel" />
                        <span class="input-icon">📱</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Min 8 characters"
                            autocomplete="new-password" />
                        <span class="input-icon">🔑</span>
                        <button class="show-toggle" type="button" onclick="togglePassword(this)"
                            aria-label="Toggle">👁</button>
                    </div>
                </div>

                <button class="btn-submit" onclick="handleRegister()" id="regBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-spinner"></span>
                </button>

                <p id="message"
                    style="text-align:center;margin-top:12px;font-size:13px;border-radius:9px;padding:9px 13px;"></p>

                <div class="divider"><span>or</span></div>
                <div class="register-row">
                    Already have an account? <a href="/login">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        function togglePassword(btn) {
            const input = btn.closest(".input-wrap").querySelector("input");
            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";
            btn.textContent = isHidden ? "🙈" : "👁";
        }

        async function handleRegister() {
            const btn = document.getElementById("regBtn");
            const msg = document.getElementById("message");
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const mobile = document.getElementById("mobile").value.trim();
            const password = document.getElementById("password").value;

            if (!name || !email || !password) {
                showMsg("Please fill all required fields.", false); return;
            }
            if (password.length < 8) {
                showMsg("Password must be at least 8 characters.", false); return;
            }

            btn.classList.add("loading");
            msg.style.display = "none";

            const res = await fetch("/api/v1/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, mobile_number: mobile, password })
            });
            const data = await res.json();

            btn.classList.remove("loading");

            if (res.ok) {
                showMsg("✅ Account created! Redirecting to login…", true);
                setTimeout(() => window.location.href = "/login", 1400);
            } else {
                showMsg(data.detail || "Registration failed.", false);
            }
        }

        function showMsg(text, ok) {
            const el = document.getElementById("message");
            el.textContent = text;
            el.style.display = "block";
            el.style.background = ok ? "rgba(61,220,151,.08)" : "rgba(255,94,109,.08)";
            el.style.border = ok ? "1px solid rgba(61,220,151,.2)" : "1px solid rgba(255,94,109,.2)";
            el.style.color = ok ? "#3ddc97" : "#ff5e6d";
        }

        document.addEventListener("keydown", e => { if (e.key === "Enter") handleRegister(); });
    </script>
</body>

</html>
