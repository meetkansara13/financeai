<script>
    function toggleSidebar() {
        document.getElementById('appSidebar').classList.toggle('open');
        document.getElementById('sbBackdrop').classList.toggle('active');
        document.body.classList.toggle('sb-lock');
    }
    function closeSidebar() {
        document.getElementById('appSidebar').classList.remove('open');
        document.getElementById('sbBackdrop').classList.remove('active');
        document.body.classList.remove('sb-lock');
    }
    function closeSidebarOnNav() {
        if (window.innerWidth <= 820) closeSidebar();
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Mark active nav item
        const page = window.location.pathname.split('/')[1] || 'dashboard';
        document.querySelectorAll('.mob-nav-item[data-page], .sb-item[data-page]').forEach(a => {
            if (a.dataset.page === page) a.classList.add('active');
        });

        // Load user info from token
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            const p = JSON.parse(atob(token.split('.')[1]));
            const email = p.sub || '';
            const raw = email.split('@')[0];
            const name = raw.split(/[._]/).map(w => w[0]?.toUpperCase() + w.slice(1)).join(' ');
            const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

            const emailEl = document.getElementById('sidebarUserEmail');
            const nameEl = document.getElementById('sidebarUserName');
            const avatarEl = document.getElementById('sidebarAvatar');
            if (emailEl) emailEl.textContent = email;
            if (nameEl) nameEl.textContent = name;
            if (avatarEl) avatarEl.textContent = initials;
        } catch (e) { }
    });
</script>
