<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — FinanceAI</title>
    <link rel="stylesheet" href="/static/css/login.css">
    <style>
        .scene {
            max-width: 480px;
            width: 100%;
        }

        .auth-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 32px 80px rgba(0, 0, 0, .5);
        }

        .logo-sm {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .logo-sm .ico {
            font-size: 20px;
        }

        .logo-sm .name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-sm .name span {
            color: var(--gold);
        }

        .auth-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .auth-sub {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 26px;
        }

        .field-group {
            margin-bottom: 16px;
        }

        .field-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: .4px;
            display: block;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color .25s;
        }

        .input-wrap input:focus {
            border-color: rgba(201, 168, 76, .5);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, .08);
        }

        .input-wrap input::placeholder {
            color: var(--text-muted);
        }

        .show-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .strength {
            margin-top: 6px;
        }

        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, .06);
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .4s, background .4s;
        }

        .strength-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), #e8c872);
            color: #0d0b04;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            box-shadow: 0 4px 18px rgba(201, 168, 76, .25);
            margin-top: 6px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(201, 168, 76, .35);
        }

        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        .msg {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            border-radius: 9px;
            padding: 10px 14px;
            display: none;
        }

        .msg.err {
            background: rgba(255, 94, 109, .08);
            border: 1px solid rgba(255, 94, 109, .2);
            color: var(--danger);
            display: block;
        }

        .msg.ok {
            background: rgba(61, 220, 151, .08);
            border: 1px solid rgba(61, 220, 151, .2);
            color: var(--success);
            display: block;
        }
    </style>
</head>

<body>
    <div class="bg-layer">
        <div class="bg-grid"></div>
        <div class="bg-orb bg-orb-2"></div>
    </div>

    <div class="scene">
        <div class="auth-card">
            <div class="logo-sm"><span class="ico">💹</span><span class="name">Finance<span>AI</span></span></div>
            <div class="auth-title">Set New Password</div>
            <div class="auth-sub">Choose a strong password for your account.</div>

            <div class="field-group">
                <label>New Password</label>
                <div class="input-wrap">
                    <input type="password" id="pw1" placeholder="Min 8 characters" oninput="checkStrength()" />
                    <button class="show-toggle" onclick="togglePw('pw1',this)">👁</button>
                </div>
                <div class="strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="sFill" style="width:0%"></div>
                    </div>
                    <div class="strength-label" id="sLabel">Enter a password</div>
                </div>
            </div>
            <div class="field-group">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <input type="password" id="pw2" placeholder="Repeat password" />
                    <button class="show-toggle" onclick="togglePw('pw2',this)">👁</button>
                </div>
            </div>

            <button class="btn-primary" onclick="resetPassword()" id="resetBtn">Reset Password</button>
            <div class="msg" id="msg"></div>
        </div>
    </div>

    <script>
        function togglePw(id, btn) {
            const inp = document.getElementById(id);
            const hide = inp.type === "password";
            inp.type = hide ? "text" : "password";
            btn.textContent = hide ? "🙈" : "👁";
        }

        function checkStrength() {
            const pw = document.getElementById("pw1").value;
            const fill = document.getElementById("sFill");
            const label = document.getElementById("sLabel");
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            const pct = [0, 25, 50, 75, 100][score];
            const color = ["#f87171", "#f87171", "#f59e0b", "#22c55e", "#22c55e"][score];
            const text = ["Too short", "Weak", "Fair", "Strong", "Very Strong"][score];
            fill.style.width = pct + "%";
            fill.style.background = color;
            label.textContent = text;
            label.style.color = color;
        }

        async function resetPassword() {
            const pw1 = document.getElementById("pw1").value;
            const pw2 = document.getElementById("pw2").value;
            const msg = document.getElementById("msg");

            if (pw1.length < 8) { showMsg("Password must be at least 8 characters.", "err"); return; }
            if (pw1 !== pw2) { showMsg("Passwords don't match.", "err"); return; }

            const token = window.location.pathname.split("/").pop();
            const res = await fetch("/api/v1/reset-password/" + token, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ new_password: pw1 })
            });
            const data = await res.json();

            if (res.ok) {
                showMsg("✅ Password reset! Redirecting to login…", "ok");
                document.getElementById("resetBtn").disabled = true;
                setTimeout(() => window.location.href = "/login", 2000);
            } else {
                showMsg(data.detail || "Reset failed. Link may have expired.", "err");
            }
        }

        function showMsg(text, type) {
            const el = document.getElementById("msg");
            el.textContent = text;
            el.className = "msg " + type;
        }
    </script>
</body>

</html>
